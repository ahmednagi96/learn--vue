<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div id="app">
      <app-button> 
        <button class="bg-red-500 hover:bg-red-600 active:scale-95 transition-all text-white px-6 py-2 rounded shadow-md cursor-pointer disabled:cursor-not-allowed" 
        
        :disabled="disabled">
          Click Here
        </button>
      </app-button>
    </div>
    <script>
      let app = {
        data(){
          return {
            disabled:true
          }
        },
        components: {
          "app-button": {
            template: `
           <div class="flex justify-center ">
            <slot />
        </div>
            `,
          },
        },
      };
      Vue.createApp(app).mount("#app"); /** to connect vue with html */
    </script>
  </body>
</html>
