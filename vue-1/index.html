<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 
  </head>
  <body>
    <div id="app" class="min-h-screen flex items-start justify-center bg-gray-800">
      <!-- Vue will render App.js here -->
  </div>
    <script type="module">
     import App from "./js/components/App.js";
      Vue.createApp(App).mount("#app"); /** to bind vue with html */
    </script>
  </body>
</html>
